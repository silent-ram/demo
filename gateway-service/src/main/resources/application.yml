server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**,/api/auth/**,/api/operation-log/**
          filters:
            - StripPrefix=1
        - id: device-service
          uri: lb://device-service
          predicates:
            - Path=/api/device/**,/api/maintenance/**,/api/report/**
          filters:
            - StripPrefix=1
        - id: collector-service
          uri: lb://data-collector-service
          predicates:
            - Path=/api/collector/**,/api/sensor-config/**
          filters:
            - StripPrefix=1
        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/api/alert/**,/api/message/**
          filters:
            - StripPrefix=1
        - id: ml-service
          uri: http://localhost:5000
          predicates:
            - Path=/api/ml/**
          filters:
            - StripPrefix=1
        - id: alert-service-ws
          uri: lb://alert-service
          predicates:
            - Path=/ws/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "*"
            allowed-methods:
              - "*"
            allowed-headers:
              - "*"
            allow-credentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}