server:
  port: 8084

spring:
  application:
    name: alert-service
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/fault_warning_alert?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: localhost

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      mlService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowType: COUNT_BASED

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:myDefaultInfluxDBTokenForDevelopment}
  org: ${INFLUXDB_ORG:cy}
  bucket: ${INFLUXDB_BUCKET:sensor_data}

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    api-key: ${ML_API_KEY:myDefaultMLApiKey}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html